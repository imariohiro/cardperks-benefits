</style></head><body><header class="top"><div class="brand">CardPerks · 管理中心</div><a class="back" href="index.html">← 返回展示页</a></header><main class="wrap"><div class="intro"><p class="eyebrow">CARD & BENEFIT SETTINGS</p><h1>卡片与权益管理</h1><p>在这里维护所有卡片、年费及权益周期。展示页会自动同步。</p></div><div class="tabs"><button id="tc" class="on" onclick="switchTab('cards')">信用卡</button><button id="tb" onclick="switchTab('benefits')">权益与周期</button></div><section class="panel" id="content"></section><div class="notice">数据保存在当前浏览器中。权益到达重置日后，会按所选周期自动清零已使用次数并进入下一周期。</div></main><script>
let cards=JSON.parse(localStorage.getItem('cp_cards')||'null')||[{id:1,bank:'浦发银行',name:'美国运通白金卡',digits:'4388',holder:'CARD HOLDER',network:'American Express',annualFee:0}];let benefits=JSON.parse(localStorage.getItem('cp_benefits')||'[]');cards=cards.map(c=>({...c,holder:c.holder||'CARD HOLDER',network:c.network||'银联',annualFee:+c.annualFee||0}));benefits.forEach(x=>{x.resetCycle=x.resetCycle||'yearly';x.deadline=x.deadline||'2026-12-31'});let tab='cards',editing=null;
const networks=['银联','Visa','Mastercard','American Express','JCB','Discover'];const cycleNames={none:'不自动重置',monthly:'每月',quarterly:'每季度',yearly:'每年'};function persist(){localStorage.setItem('cp_cards',JSON.stringify(cards));localStorage.setItem('cp_benefits',JSON.stringify(benefits))}function label(id){let c=cards.find(x=>x.id==id);return c?c.bank+' · '+c.name:'未关联'}function addCycle(date,cycle){let d=new Date(date+'T00:00:00'),day=d.getDate(),m=cycle==='monthly'?1:cycle==='quarterly'?3:12;d.setDate(1);d.setMonth(d.getMonth()+m);d.setDate(Math.min(day,new Date(d.getFullYear(),d.getMonth()+1,0).getDate()));return d.toISOString().slice(0,10)}function resetExpired(){let today=new Date().toISOString().slice(0,10),changed=false;benefits.forEach(x=>{if(x.resetCycle!=='none'&&x.deadline<today){x.used=0;while(x.deadline<today)x.deadline=addCycle(x.deadline,x.resetCycle);changed=true}});if(changed)persist()}
function switchTab(t){tab=t;editing=null;document.querySelector('#tc').classList.toggle('on',t==='cards');document.querySelector('#tb').classList.toggle('on',t==='benefits');render()}function render(){resetExpired();document.querySelector('#content').innerHTML=tab==='cards'?cardView():benefitView()}
function cardView(){return `<div class="list">${cards.map(c=>`<div class="item"><div><b>${c.network} · ${c.bank} · ${c.name}</b><small>${c.holder} · 尾号 ${c.digits} · 年费 ¥${c.annualFee}</small></div><div class="actions"><button onclick="editing=${c.id};render()">编辑</button><button class="danger" onclick="delCard(${c.id})">删除</button></div></div>`).join('')||'<div class="empty">还没有信用卡</div>'}</div>${cardForm()}`}
function cardForm(){let c=cards.find(x=>x.id===editing);return `<form class="form" onsubmit="saveCard(event)"><label>发卡银行<input name="bank" required value="${c?.bank||''}"></label><label>卡片名称<input name="name" required value="${c?.name||''}"></label><label>卡组织<select name="network">${networks.map(n=>`<option ${c?.network===n?'selected':''}>${n}</option>`).join('')}</select></label><label>卡号后四位<input name="digits" pattern="[0-9]{4}" required value="${c?.digits||''}"></label><label>持卡人姓名<input name="holder" required value="${c?.holder||''}"></label><label>年费（元）<input name="annualFee" type="number" min="0" required value="${c?.annualFee||0}"></label><button class="save">${c?'保存卡片修改':'＋ 添加信用卡'}</button></form>`}
function benefitView(){return `<div class="list">${benefits.map(x=>`<div class="item"><div><b>${x.icon} ${x.name}</b><small>${label(x.cardId)} · ${x.used}/${x.total}${x.unit} · ${cycleNames[x.resetCycle]}重置 · ${x.deadline}</small></div><div class="actions"><button onclick="editing=${x.id};render()">编辑</button><button class="danger" onclick="delBenefit(${x.id})">删除</button></div></div>`).join('')||'<div class="empty">还没有权益</div>'}</div>${benefitForm()}`}
function benefitForm(){let x=benefits.find(v=>v.id===editing);return `<form class="form" onsubmit="saveBenefit(event)"><label>所属信用卡<select name="cardId" required>${cards.map(c=>`<option value="${c.id}" ${x?.cardId==c.id?'selected':''}>${c.bank} · ${c.name}</option>`).join('')}</select></label><label>权益名称<input name="name" required value="${x?.name||''}"></label><label class="wide">权益说明<input name="desc" required value="${x?.desc||''}"></label><label>图标<input name="icon" maxlength="2" required value="${x?.icon||'✦'}"></label><label>单位<input name="unit" required value="${x?.unit||'次'}"></label><label>已使用<input name="used" type="number" min="0" required value="${x?.used||0}"></label><label>总数量<input name="total" type="number" min="1" required value="${x?.total||1}"></label><label>重置周期<select name="resetCycle"><option value="none" ${x?.resetCycle==='none'?'selected':''}>不自动重置</option><option value="monthly" ${x?.resetCycle==='monthly'?'selected':''}>每月</option><option value="quarterly" ${x?.resetCycle==='quarterly'?'selected':''}>每季度</option><option value="yearly" ${!x||x?.resetCycle==='yearly'?'selected':''}>每年</option></select></label><label>下次重置日<input name="deadline" type="date" required value="${x?.deadline||new Date().toISOString().slice(0,10)}"></label><button class="save">${x?'保存权益修改':'＋ 添加权益'}</button></form>`}
function saveCard(e){e.preventDefault();let f=new FormData(e.target),v={id:editing||Date.now(),bank:f.get('bank'),name:f.get('name'),network:f.get('network'),digits:f.get('digits'),holder:f.get('holder'),annualFee:+f.get('annualFee')};if(editing)cards=cards.map(c=>c.id===editing?v:c);else cards.push(v);editing=null;persist();render()}function saveBenefit(e){e.preventDefault();let f=new FormData(e.target),v={id:editing||Date.now(),cardId:+f.get('cardId'),name:f.get('name'),desc:f.get('desc'),icon:f.get('icon'),unit:f.get('unit'),used:+f.get('used'),total:+f.get('total'),resetCycle:f.get('resetCycle'),deadline:f.get('deadline')};if(editing)benefits=benefits.map(x=>x.id===editing?v:x);else benefits.push(v);editing=null;persist();render()}function delCard(id){let n=benefits.filter(x=>x.cardId===id).length;if(confirm(n?`会同时删除关联的 ${n} 项权益，继续吗？`:'确认删除卡片吗？')){cards=cards.filter(x=>x.id!==id);benefits=benefits.filter(x=>x.cardId!==id);persist();render()}}function delBenefit(id){if(confirm('确认删除权益吗？')){benefits=benefits.filter(x=>x.id!==id);persist();render()}}persist();render();
</script><script>
